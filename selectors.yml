selectors:
  - name: staging
    description: All staging models and their tests
    definition:
      method: tag
      value: staging

  - name: intermediate
    description: All intermediate models and their tests
    definition:
      method: tag
      value: intermediate

  - name: marts
    description: All mart models and their tests
    definition:
      method: tag
      value: marts

  - name: marts_with_upstream
    description: Mart models with all upstream dependencies and tests
    definition: "+tag:marts"

  - name: raw_sources
    description: All football_raw sources for source freshness checks
    definition:
      method: source
      value: football_raw
