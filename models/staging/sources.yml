version: 2

sources:
  - name: football_raw
    description: Raw Transfermarkt football dataset imported from Kaggle
    database: "{{ env_var('DBT_SOURCE_DATABASE', target.database) }}"
    schema: football_raw
    loader: Kaggle
    config:
      meta:
        owner: analytics
        source_url: https://www.kaggle.com/datasets/davidcariboo/player-scores
        freshness_basis: BigQuery table last-modified metadata
      freshness:
        warn_after:
          count: 7
          period: day
        error_after:
          count: 14
          period: day
    tables:
      - name: players
        description: Player profiles, positions, current clubs, and market values
        columns:
          - name: player_id
            description: Unique player identifier
            data_tests:
              - not_null
              - unique
          - name: name
            description: Full player name
          - name: current_club_id
            description: Current club identifier
          - name: market_value_in_eur
            description: Current market value in EUR

      - name: clubs
        description: Current club details including squad, stadium, and domestic competition
        columns:
          - name: club_id
            description: Unique club identifier
            data_tests:
              - unique
              - not_null
          - name: name
            description: Club name
          - name: domestic_competition_id
            description: Domestic competition identifier

      - name: appearances
        description: One row per player appearance per game with performance statistics
        columns:
          - name: appearance_id
            description: Unique appearance identifier
            data_tests:
              - not_null
              - unique
          - name: game_id
            description: Game identifier
            data_tests:
              - not_null
          - name: player_id
            description: Player identifier
            data_tests:
              - not_null
          - name: competition_id
            description: Competition identifier

      - name: games
        description: One row per game with scores, attendance, formations, and participants
        columns:
          - name: game_id
            description: Unique game identifier
            data_tests:
              - not_null
              - unique
          - name: competition_id
            description: Competition identifier
          - name: season
            description: Game season
          - name: home_club_id
            description: Home club identifier
          - name: away_club_id
            description: Away club identifier

      - name: transfers
        description: Player transfers between clubs with fees and market values
        columns:
          - name: player_id
            description: Player identifier
            data_tests:
              - not_null
          - name: transfer_date
            description: Transfer date
            data_tests:
              - not_null
          - name: transfer_fee
            description: Transfer fee amount
          - name: market_value_in_eur
            description: Player market value at transfer date

      - name: player_valuations
        description: Player market value history
        columns:
          - name: player_id
            description: Player identifier
            data_tests:
              - not_null
          - name: date
            description: Market value record date
            data_tests:
              - not_null
          - name: market_value_in_eur
            description: Player market value in EUR

      - name: competitions
        description: Leagues and tournaments tracked by the dataset
        columns:
          - name: competition_id
            description: Unique competition identifier
            data_tests:
              - not_null
              - unique

      - name: countries
        description: Country reference data with confederation and aggregate statistics
        columns:
          - name: country_id
            description: Unique country identifier
            data_tests:
              - not_null
              - unique

      - name: club_games
        description: Game-level results from each participating club's perspective
        columns:
          - name: game_id
            description: Game identifier
            data_tests:
              - not_null
          - name: club_id
            description: Club identifier
            data_tests:
              - not_null
          - name: is_win
            description: Match result flag

      - name: game_events
        description: In-game goals, cards, substitutions, and other events
        columns:
          - name: game_event_id
            description: Unique game event identifier
            data_tests:
              - not_null
              - unique

      - name: game_lineups
        description: Starting and substitute lineup records per game
        columns:
          - name: game_lineups_id
            description: Unique lineup record identifier
            data_tests:
              - not_null
              - unique

      - name: national_teams
        description: National team profiles, rankings, and squad details
        columns:
          - name: national_team_id
            description: Unique national team identifier
            data_tests:
              - not_null
              - unique
