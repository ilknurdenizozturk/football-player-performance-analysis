version: 2

models:
  - name: stg_players
    description: Cleaned player profiles from the raw player source
    columns:
      - name: player_id
        description: Unique player identifier
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: Player first name
      - name: last_name
        description: Player last name
      - name: player_name
        description: Player full display name
      - name: last_season
        description: Latest season associated with the player in the source
      - name: current_club_id
        description: Current club identifier reported by the player source
      - name: country_of_birth
        description: Country where the player was born
      - name: city_of_birth
        description: City where the player was born
      - name: country_of_citizenship
        description: Country of player citizenship
      - name: birth_date
        description: Player date of birth
      - name: sub_position
        description: Detailed playing position
      - name: position
        description: Broad playing position
      - name: preferred_foot
        description: Player preferred foot
      - name: height_in_cm
        description: Validated player height in centimeters; values outside 100-250 are null
      - name: contract_expiration_date
        description: Current contract expiration date
      - name: agent_name
        description: Player agent name
      - name: international_caps
        description: Number of senior international appearances
      - name: international_goals
        description: Number of senior international goals
      - name: current_national_team_id
        description: Current national team identifier
      - name: current_club_domestic_competition_id
        description: Domestic competition identifier of the current club
      - name: current_club_name
        description: Current club name reported by the player source
      - name: market_value_in_eur
        description: Current player market value in EUR
      - name: highest_market_value_in_eur
        description: Highest player market value in EUR reported by the source

  - name: stg_appearances
    description: Cleaned player appearance records at player-game grain
    columns:
      - name: appearance_id
        description: Unique appearance record identifier
      - name: game_id
        description: Identifier of the game in which the player appeared
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_games')
                field: game_id
      - name: player_id
        description: Identifier of the appearing player
      - name: player_club_id
        description: Club represented by the player in the game
      - name: player_current_club_id
        description: Player current club identifier at source extraction time; sentinel -1 is normalized to null
      - name: appearance_date
        description: Date of the appearance
      - name: player_name
        description: Player name recorded on the appearance
      - name: competition_id
        description: Competition identifier for the appearance
      - name: yellow_cards
        description: Yellow cards received in the appearance
      - name: red_cards
        description: Red cards received in the appearance
      - name: goals
        description: Goals scored in the appearance
      - name: assists
        description: Assists recorded in the appearance
      - name: minutes_played
        description: Minutes played in the appearance

  - name: stg_games
    description: Cleaned game records at game grain
    columns:
      - name: game_id
        description: Unique game identifier
      - name: competition_id
        description: Competition identifier for the game
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_competitions')
                field: competition_id
      - name: season
        description: Season in which the game was played
      - name: round
        description: Competition round or matchday label
      - name: game_date
        description: Date of the game
      - name: home_club_id
        description: Home club identifier
      - name: away_club_id
        description: Away club identifier
      - name: home_club_goals
        description: Goals scored by the home club
      - name: away_club_goals
        description: Goals scored by the away club
      - name: home_club_position
        description: Home club competition position recorded for the game
      - name: away_club_position
        description: Away club competition position recorded for the game
      - name: home_club_manager_name
        description: Home club manager name recorded for the game
      - name: away_club_manager_name
        description: Away club manager name recorded for the game
      - name: stadium
        description: Stadium where the game was played
      - name: attendance
        description: Reported game attendance
      - name: referee
        description: Match referee name
      - name: home_club_formation
        description: Home club tactical formation
      - name: away_club_formation
        description: Away club tactical formation
      - name: home_club_name
        description: Home club name recorded for the game
      - name: away_club_name
        description: Away club name recorded for the game
      - name: aggregate
        description: Aggregate score or tie information from the source
      - name: competition_type
        description: Competition type recorded for the game

  - name: stg_club_games
    description: Cleaned game records from each participating club's perspective
    columns:
      - name: game_id
        description: Identifier of the represented game
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_games')
                field: game_id
      - name: club_id
        description: Identifier of the club whose perspective the row represents
      - name: own_goals
        description: Goals scored by the represented club
      - name: own_position
        description: Competition position of the represented club
      - name: own_manager_name
        description: Manager of the represented club
      - name: opponent_id
        description: Opponent club identifier
      - name: opponent_goals
        description: Goals scored by the opponent
      - name: opponent_position
        description: Competition position of the opponent
      - name: opponent_manager_name
        description: Opponent manager name
      - name: hosting
        description: Whether the represented club was home or away
      - name: is_win
        description: Flag indicating whether the represented club won

  - name: stg_player_valuations
    description: Cleaned player market value history at player and valuation-date grain
    columns:
      - name: player_id
        description: Identifier of the valued player
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_players')
                field: player_id
      - name: valuation_date
        description: Date of the market value record
      - name: market_value_in_eur
        description: Player market value in EUR on the valuation date
      - name: current_club_name
        description: Player club name recorded on the valuation date
      - name: current_club_id
        description: Player club identifier recorded on the valuation date
      - name: player_club_domestic_competition_id
        description: Domestic competition identifier of the recorded club

  - name: stg_transfers
    description: Cleaned player transfer history
    columns:
      - name: player_id
        description: Identifier of the transferred player
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_players')
                field: player_id
      - name: transfer_date
        description: Date of the transfer
      - name: transfer_season
        description: Season label associated with the transfer
      - name: from_club_id
        description: Origin club identifier
      - name: to_club_id
        description: Destination club identifier
      - name: from_club_name
        description: Origin club name
      - name: to_club_name
        description: Destination club name
      - name: transfer_fee
        description: Transfer fee in EUR as an exact NUMERIC value when known
      - name: market_value_in_eur
        description: Player market value in EUR at transfer time as an exact NUMERIC value when known
      - name: player_name
        description: Player name recorded by the transfer source

  - name: stg_clubs
    description: Cleaned current club profiles from the raw club source
    columns:
      - name: club_id
        description: Unique club identifier
      - name: club_code
        description: Club short code
      - name: club_name
        description: Club name
      - name: domestic_competition_id
        description: Current domestic competition identifier
      - name: total_market_value
        description: Raw total club market value field
      - name: squad_size
        description: Current squad size
      - name: average_age
        description: Current squad average age
      - name: foreigners_number
        description: Number of foreign players in the squad
      - name: foreigners_percentage
        description: Percentage of foreign players in the squad
      - name: national_team_players
        description: Number of national team players in the squad
      - name: stadium_name
        description: Club stadium name
      - name: stadium_seats
        description: Stadium seating capacity
      - name: net_transfer_record
        description: Raw club net transfer record
      - name: coach_name
        description: Current coach name
      - name: last_season
        description: Latest season associated with the club

  - name: stg_competitions
    description: Cleaned competition reference records
    columns:
      - name: competition_id
        description: Unique competition identifier
      - name: competition_code
        description: Competition short code
      - name: competition_name
        description: Competition name
      - name: competition_sub_type
        description: Detailed competition subtype
      - name: competition_type
        description: Broad competition type
      - name: country_id
        description: Host country identifier
      - name: country_name
        description: Host country name
      - name: domestic_league_code
        description: Domestic league code associated with the competition
      - name: confederation
        description: Football confederation
      - name: total_clubs
        description: Number of clubs reported by the source

  - name: stg_countries
    description: Cleaned country reference records
    columns:
      - name: country_id
        description: Unique country identifier
      - name: country_name
        description: Country name
      - name: country_code
        description: Country short code
      - name: confederation
        description: Football confederation
      - name: total_clubs
        description: Number of clubs reported for the country
      - name: total_players
        description: Number of players reported for the country
      - name: average_age
        description: Average player age reported for the country

  - name: stg_game_events
    description: Cleaned in-game event records with normalized event types and sentinel values
    columns:
      - name: game_event_id
        description: Unique game event identifier
      - name: event_date
        description: Date of the game event
      - name: game_id
        description: Identifier of the game containing the event
      - name: minute
        description: Match minute of the event; sentinel -1 is normalized to null
      - name: event_type
        description: Normalized lowercase event type
      - name: club_id
        description: Club identifier associated with the event
      - name: club_name
        description: Club name associated with the event
      - name: player_id
        description: Primary player identifier associated with the event
      - name: event_description
        description: Event detail text; empty values are normalized to null
      - name: player_in_id
        description: Incoming player identifier for substitution events
      - name: player_assist_id
        description: Assisting player identifier for goal events

  - name: stg_game_lineups
    description: Cleaned starting and substitute lineup records
    columns:
      - name: game_lineups_id
        description: Unique lineup record identifier
      - name: lineup_date
        description: Date of the lineup record
      - name: game_id
        description: Identifier of the game associated with the lineup
      - name: player_id
        description: Lineup player identifier
      - name: club_id
        description: Club represented by the player
      - name: player_name
        description: Player name recorded in the lineup
      - name: lineup_type
        description: Normalized lineup role such as starter or substitute
      - name: position
        description: Normalized uppercase lineup position; empty values are null
      - name: squad_number
        description: Squad number recorded for the game
      - name: team_captain
        description: Flag indicating whether the player was team captain

  - name: stg_national_teams
    description: Cleaned national team profiles and ranking data
    columns:
      - name: national_team_id
        description: Unique national team identifier
      - name: national_team_name
        description: National team name
      - name: team_code
        description: National team short code
      - name: country_id
        description: Country identifier represented by the national team
      - name: country_name
        description: Country name represented by the national team
      - name: country_code
        description: Country short code
      - name: confederation
        description: Football confederation
      - name: squad_size
        description: National team squad size
      - name: average_age
        description: National team squad average age
      - name: foreigners_number
        description: Number of foreign-based players reported by the source
      - name: foreigners_percentage
        description: Percentage of foreign-based players reported by the source
      - name: total_market_value
        description: Total national team market value
      - name: coach_name
        description: National team coach name
      - name: fifa_ranking
        description: FIFA ranking reported by the source
      - name: last_season
        description: Latest season associated with the national team
