version: 2

models:
  - name: int_club_performance_summary
    description: One row per club with all-time match performance
    columns:
      - name: club_id
        description: Unique club identifier
        data_tests:
          - not_null
          - unique
      - name: matches_played
        description: Distinct matches played by the club
      - name: wins
        description: Matches won by the club
      - name: draws
        description: Matches drawn by the club
      - name: losses
        description: Matches lost by the club
      - name: goals_scored
        description: Total goals scored by the club
      - name: goals_conceded
        description: Total goals conceded by the club
      - name: goal_difference
        description: Goals scored minus goals conceded
      - name: win_rate
        description: Percentage of matches won, rounded to two decimals
      - name: avg_goals_scored
        description: Average goals scored per match, rounded to two decimals
      - name: avg_goals_conceded
        description: Average goals conceded per match, rounded to two decimals

  - name: int_competition_summary
    description: One row per competition with all-time match metrics
    columns:
      - name: competition_id
        description: Unique competition identifier
        data_tests:
          - not_null
          - unique
      - name: competition_name
        description: Competition name
      - name: competition_type
        description: Broad competition type
      - name: country_name
        description: Host country name
      - name: confederation
        description: Football confederation
      - name: matches_played
        description: Distinct matches played in the competition
      - name: total_goals
        description: Total home and away goals scored in the competition
      - name: avg_goals_per_match
        description: Average total goals per match, rounded to two decimals
      - name: club_participation_count
        description: Distinct home or away clubs that participated in the competition
      - name: avg_attendance
        description: Average reported match attendance, rounded to two decimals

  - name: int_player_market_value_summary
    description: One row per player with market value history metrics
    columns:
      - name: player_id
        description: Unique player identifier
        data_tests:
          - not_null
          - unique
      - name: first_valuation_date
        description: Earliest available market valuation date
      - name: latest_valuation_date
        description: Latest available market valuation date
      - name: first_market_value
        description: Player market value on the earliest available valuation date
      - name: current_market_value
        description: Player market value on the latest available valuation date
      - name: highest_market_value
        description: Highest available player market value
      - name: market_value_growth
        description: Current market value minus first market value in EUR
      - name: market_value_growth_pct
        description: Percentage growth from first to current market value, rounded to two decimals
      - name: latest_club_id
        description: Club identifier recorded on the latest available valuation
      - name: latest_club_name
        description: Club name recorded on the latest available valuation

  - name: int_player_performance_summary
    description: One row per player with all-time appearance performance
    columns:
      - name: player_id
        description: Unique player identifier
        data_tests:
          - not_null
          - unique
      - name: matches_played
        description: Distinct matches with a player appearance
      - name: total_goals
        description: Total goals across appearances
      - name: total_assists
        description: Total assists across appearances
      - name: total_minutes_played
        description: Total minutes played across appearances
      - name: total_yellow_cards
        description: Total yellow cards across appearances
      - name: total_red_cards
        description: Total red cards across appearances
      - name: avg_minutes_per_match
        description: Average minutes played per appearance, rounded to two decimals
      - name: goals_per_match
        description: Total goals divided by distinct matches, rounded to two decimals
      - name: assists_per_match
        description: Total assists divided by distinct matches, rounded to two decimals
      - name: goals_per_90
        description: Total goals per 90 minutes played, rounded to two decimals
      - name: assists_per_90
        description: Total assists per 90 minutes played, rounded to two decimals

  - name: int_player_profile
    description: Enriched player profile at player grain
    columns:
      - name: player_id
        description: Unique player identifier
        data_tests:
          - not_null
          - unique
      - name: player_name
        description: Player full display name
      - name: position
        description: Broad playing position
      - name: sub_position
        description: Detailed playing position
      - name: preferred_foot
        description: Player preferred foot
      - name: country_of_birth
        description: Country where the player was born
      - name: country_of_citizenship
        description: Country of player citizenship
      - name: birth_date
        description: Player date of birth
      - name: age
        description: Player age in completed years as of the current date
      - name: height_in_cm
        description: Validated player height in centimeters
      - name: agent_name
        description: Player agent name
      - name: current_club_id
        description: Current club identifier reported by the player source
      - name: current_club_name
        description: Current club name reported by the player source
      - name: international_caps
        description: Number of senior international appearances
      - name: international_goals
        description: Number of senior international goals
      - name: market_value_in_eur
        description: Current market value reported by the player source
      - name: matches_played
        description: Distinct matches with a player appearance
      - name: total_goals
        description: Total goals across appearances
      - name: total_assists
        description: Total assists across appearances
      - name: total_minutes_played
        description: Total minutes played across appearances
      - name: goals_per_match
        description: Goals per match, rounded to two decimals
      - name: assists_per_match
        description: Assists per match, rounded to two decimals
      - name: goals_per_90
        description: Goals per 90 minutes, rounded to two decimals
      - name: assists_per_90
        description: Assists per 90 minutes, rounded to two decimals
      - name: first_market_value
        description: Player market value on the earliest available valuation date
      - name: current_market_value
        description: Player market value on the latest available valuation date
      - name: highest_market_value
        description: Highest available player market value
      - name: market_value_growth
        description: Current market value minus first market value in EUR
      - name: market_value_growth_pct
        description: Percentage growth from first to current market value, rounded to two decimals
      - name: transfer_count
        description: Number of transfer records for the player
      - name: total_transfer_fee
        description: Sum of known player transfer fees in EUR
      - name: latest_transfer_fee
        description: Transfer fee on the deterministically selected latest transfer

  - name: int_transfer_summary
    description: One row per player with transfer history metrics
    columns:
      - name: player_id
        description: Unique player identifier
        data_tests:
          - not_null
          - unique
      - name: transfer_count
        description: Number of transfer records for the player
      - name: total_transfer_fee
        description: Sum of known transfer fees in EUR
      - name: avg_transfer_fee
        description: Average known transfer fee in EUR
      - name: max_transfer_fee
        description: Highest known transfer fee in EUR
      - name: latest_transfer_date
        description: Date of the deterministically selected latest transfer
      - name: latest_transfer_season
        description: Season label of the deterministically selected latest transfer
      - name: latest_from_club_id
        description: Origin club identifier of the latest transfer
      - name: latest_to_club_id
        description: Destination club identifier of the latest transfer
      - name: latest_from_club_name
        description: Origin club name of the latest transfer
      - name: latest_to_club_name
        description: Destination club name of the latest transfer
      - name: latest_transfer_fee
        description: Transfer fee of the latest transfer when known
      - name: latest_transfer_market_value
        description: Player market value recorded on the latest transfer when known

  - name: int_player_season_performance
    description: One row per player, season, and competition with performance and the latest eligible market value
    columns:
      - name: player_id
        description: Player identifier
      - name: season
        description: Match season
      - name: competition_id
        description: Competition identifier
      - name: matches_played
        description: Distinct matches with an appearance in the season and competition
      - name: total_goals
        description: Total goals in the season and competition
      - name: total_assists
        description: Total assists in the season and competition
      - name: total_minutes_played
        description: Total minutes played in the season and competition
      - name: total_yellow_cards
        description: Total yellow cards in the season and competition
      - name: total_red_cards
        description: Total red cards in the season and competition
      - name: goals_per_match
        description: Goals per match in the season and competition, rounded to two decimals
      - name: assists_per_match
        description: Assists per match in the season and competition, rounded to two decimals
      - name: goals_per_90
        description: Goals per 90 minutes in the season and competition, rounded to two decimals
      - name: assists_per_90
        description: Assists per 90 minutes in the season and competition, rounded to two decimals
      - name: season_market_value
        description: Latest available market value on or before the player's last game in the group
      - name: season_market_value_date
        description: Date of the selected season market value
