version: 2

models:
  - name: ml_player_market_value_training
    description: Leakage-safe training features for predicting a player's market value from information available strictly before the target valuation date
    columns:
      - name: training_row_key
        description: Unique training-row key formed from player and season
        data_tests:
          - unique
          - not_null
      - name: player_id
        description: Player identifier
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_players')
                field: player_id
      - name: player_name
        description: Best available player name for prediction review
      - name: season
        description: Season associated with the target valuation
        data_tests:
          - not_null
      - name: competition_id
        description: Domestic competition identifier recorded on the target valuation
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_competitions')
                field: competition_id
      - name: has_competition_context
        description: Flag indicating that the target valuation has domestic competition context
        data_tests:
          - not_null
      - name: position
        description: Broad playing position
      - name: sub_position
        description: Detailed playing position
      - name: preferred_foot
        description: Player preferred foot
      - name: height_in_cm
        description: Validated player height in centimeters
      - name: country_of_citizenship
        description: Player country of citizenship
      - name: competition_type
        description: Broad competition type
      - name: competition_country_name
        description: Host country of the competition
      - name: confederation
        description: Football confederation of the competition
      - name: age_at_target_date
        description: Player age in completed years on the target valuation date; implausible source ages outside 10-60 are normalized to NULL
      - name: matches_before_target
        description: Distinct matches across all competitions in the season strictly before the target valuation date
        data_tests:
          - not_null
      - name: competitions_played_before_target
        description: Distinct competitions with player appearances in the season strictly before the target valuation date
        data_tests:
          - not_null
      - name: minutes_before_target
        description: Minutes played in the season and competition strictly before the target valuation date
        data_tests:
          - not_null
      - name: goals_before_target
        description: Goals scored in the season and competition strictly before the target valuation date
        data_tests:
          - not_null
      - name: assists_before_target
        description: Assists recorded in the season and competition strictly before the target valuation date
        data_tests:
          - not_null
      - name: yellow_cards_before_target
        description: Yellow cards recorded in the season and competition strictly before the target valuation date
        data_tests:
          - not_null
      - name: red_cards_before_target
        description: Red cards recorded in the season and competition strictly before the target valuation date
        data_tests:
          - not_null
      - name: goals_per_90_before_target
        description: Goals per 90 minutes calculated only from appearances strictly before the target valuation date
      - name: assists_per_90_before_target
        description: Assists per 90 minutes calculated only from appearances strictly before the target valuation date
      - name: feature_last_appearance_date
        description: Latest appearance date included in performance features
      - name: previous_market_value_date
        description: Latest available valuation date strictly before the target valuation date
      - name: previous_market_value_eur
        description: Latest available player market value strictly before the target valuation date
      - name: has_previous_market_value
        description: Flag indicating that a prior market value is available
        data_tests:
          - not_null
      - name: days_since_previous_market_value
        description: Days between the previous and target market value dates
      - name: prior_valuation_count
        description: Number of player valuations strictly before the target valuation date
        data_tests:
          - not_null
      - name: prior_highest_market_value_eur
        description: Highest player valuation strictly before the target valuation date
      - name: target_market_value_date
        description: Valuation date being predicted
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day
      - name: target_market_value_eur
        description: Positive player market value in EUR used as the supervised-learning target
        data_tests:
          - not_null

  - name: ml_player_market_value_scoring
    description: Current scoring features for active players in the latest observed season using information available through the build date
    columns:
      - name: scoring_row_key
        description: Unique scoring-row key formed from player identifier
        data_tests:
          - unique
          - not_null
      - name: player_id
        description: Player identifier
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_players')
                field: player_id
      - name: player_name
        description: Best available player name for prediction review
      - name: season
        description: Latest observed match season used for scoring features
        data_tests:
          - not_null
      - name: competition_id
        description: Domestic competition identifier recorded on the latest available valuation
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_competitions')
                field: competition_id
      - name: has_competition_context
        description: Flag indicating that the latest valuation has domestic competition context
        data_tests:
          - not_null
      - name: position
        description: Broad playing position
      - name: sub_position
        description: Detailed playing position
      - name: preferred_foot
        description: Player preferred foot
      - name: height_in_cm
        description: Validated player height in centimeters
      - name: country_of_citizenship
        description: Player country of citizenship
      - name: competition_type
        description: Broad competition type
      - name: competition_country_name
        description: Host country of the latest valuation competition
      - name: confederation
        description: Football confederation of the latest valuation competition
      - name: age_at_target_date
        description: Player age in completed years on the prediction build date; implausible source ages outside 10-60 are normalized to NULL
      - name: matches_before_target
        description: Distinct matches in the latest observed season through the prediction build date
        data_tests:
          - not_null
      - name: competitions_played_before_target
        description: Distinct competitions with appearances in the latest observed season through the prediction build date
        data_tests:
          - not_null
      - name: minutes_before_target
        description: Minutes played in the latest observed season through the prediction build date
        data_tests:
          - not_null
      - name: goals_before_target
        description: Goals scored in the latest observed season through the prediction build date
        data_tests:
          - not_null
      - name: assists_before_target
        description: Assists recorded in the latest observed season through the prediction build date
        data_tests:
          - not_null
      - name: yellow_cards_before_target
        description: Yellow cards recorded in the latest observed season through the prediction build date
        data_tests:
          - not_null
      - name: red_cards_before_target
        description: Red cards recorded in the latest observed season through the prediction build date
        data_tests:
          - not_null
      - name: goals_per_90_before_target
        description: Goals per 90 minutes in the latest observed season through the prediction build date
      - name: assists_per_90_before_target
        description: Assists per 90 minutes in the latest observed season through the prediction build date
      - name: feature_last_appearance_date
        description: Latest appearance date included in scoring performance features
      - name: previous_market_value_date
        description: Latest available valuation date on or before the prediction build date
      - name: previous_market_value_eur
        description: Latest available player market value on or before the prediction build date
      - name: has_previous_market_value
        description: Flag indicating that a previous market value is available
        data_tests:
          - not_null
      - name: days_since_previous_market_value
        description: Days between the latest available valuation and prediction build date
      - name: prior_valuation_count
        description: Number of player valuations available through the prediction build date
        data_tests:
          - not_null
      - name: prior_highest_market_value_eur
        description: Highest player valuation available through the prediction build date
      - name: prediction_as_of_date
        description: Date on which the scoring feature table was built
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day
