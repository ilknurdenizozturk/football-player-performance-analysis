version: 2

models:
  - name: dim_players
    description: Player dimension containing current profiles and historical players referenced by facts
    columns:
      - name: player_id
        description: Unique player identifier
        data_tests:
          - unique
          - not_null
      - name: player_name
        description: Best available player name
      - name: position
        description: Broad playing position
      - name: sub_position
        description: Detailed playing position
      - name: birth_date
        description: Player date of birth
      - name: country_of_birth
        description: Player country of birth
      - name: country_of_citizenship
        description: Player country of citizenship
      - name: height_in_cm
        description: Validated player height in centimeters
      - name: preferred_foot
        description: Player preferred foot
      - name: agent_name
        description: Player agent name
      - name: current_club_id
        description: Best available current or latest club identifier
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: current_club_name
        description: Best available current or latest club name
      - name: last_season
        description: Latest season associated with the player

  - name: dim_clubs
    description: Club dimension containing current and historical clubs referenced by facts
    columns:
      - name: club_id
        description: Unique club identifier
        data_tests:
          - unique
          - not_null
      - name: club_code
        description: Club short code when available
      - name: club_name
        description: Best available club name
      - name: domestic_competition_id
        description: Current domestic competition identifier when available
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_competitions')
                field: competition_id
      - name: total_market_value
        description: Raw club total market value field
      - name: squad_size
        description: Current squad size
      - name: average_age
        description: Current squad average age
      - name: foreigners_number
        description: Number of foreign players in the squad
      - name: foreigners_percentage
        description: Percentage of foreign players in the squad
      - name: national_team_players
        description: Number of national team players in the squad
      - name: stadium_name
        description: Club stadium name
      - name: stadium_seats
        description: Stadium seating capacity
      - name: net_transfer_record
        description: Raw club net transfer record
      - name: coach_name
        description: Best available club coach or manager name
      - name: last_season
        description: Latest season associated with the club

  - name: dim_competitions
    description: Competition reference dimension
    columns:
      - name: competition_id
        description: Unique competition identifier
        data_tests:
          - unique
          - not_null
      - name: competition_code
        description: Competition short code
      - name: competition_name
        description: Competition name
      - name: competition_sub_type
        description: Detailed competition subtype
      - name: competition_type
        description: Broad competition type
      - name: country_id
        description: Host country identifier
      - name: country_name
        description: Host country name
      - name: domestic_league_code
        description: Domestic league code associated with the competition
      - name: confederation
        description: Football confederation
      - name: total_clubs
        description: Number of clubs reported by the source

  - name: fct_club_performance
    description: All-time club performance fact table at club grain
    columns:
      - name: club_id
        description: Club identifier
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: club_name
        description: Club name from the club dimension
      - name: domestic_competition_id
        description: Current domestic competition identifier from the club dimension
      - name: matches_played
        description: Distinct matches played
      - name: wins
        description: Matches won
      - name: draws
        description: Matches drawn
      - name: losses
        description: Matches lost
      - name: goals_scored
        description: Total goals scored
      - name: goals_conceded
        description: Total goals conceded
      - name: goal_difference
        description: Goals scored minus goals conceded
      - name: win_rate
        description: Percentage of matches won, rounded to two decimals
      - name: avg_goals_scored
        description: Average goals scored per match, rounded to two decimals
      - name: avg_goals_conceded
        description: Average goals conceded per match, rounded to two decimals

  - name: fct_competition_performance
    description: All-time competition performance fact table at competition grain
    columns:
      - name: competition_id
        description: Competition identifier
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_competitions')
                field: competition_id
      - name: competition_name
        description: Competition name
      - name: competition_type
        description: Broad competition type
      - name: country_name
        description: Host country name
      - name: confederation
        description: Football confederation
      - name: matches_played
        description: Distinct matches played in the competition
      - name: total_goals
        description: Total goals scored in the competition
      - name: avg_goals_per_match
        description: Average total goals per match, rounded to two decimals
      - name: club_participation_count
        description: Distinct clubs that participated in the competition
      - name: avg_attendance
        description: Average reported match attendance, rounded to two decimals

  - name: fct_player_performance
    description: All-time player performance fact table at player grain
    columns:
      - name: player_id
        description: Player identifier
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_players')
                field: player_id
      - name: player_name
        description: Player name
      - name: position
        description: Broad playing position
      - name: sub_position
        description: Detailed playing position
      - name: current_club_id
        description: Current club identifier from the player profile
      - name: current_club_name
        description: Current club name from the player profile
      - name: market_value_in_eur
        description: Current player market value in EUR
      - name: matches_played
        description: Distinct matches with an appearance
      - name: total_goals
        description: Total goals
      - name: total_assists
        description: Total assists
      - name: total_minutes_played
        description: Total minutes played
      - name: total_yellow_cards
        description: Total yellow cards
      - name: total_red_cards
        description: Total red cards
      - name: avg_minutes_per_match
        description: Average minutes played per appearance, rounded to two decimals
      - name: goals_per_match
        description: Goals per match, rounded to two decimals
      - name: assists_per_match
        description: Assists per match, rounded to two decimals
      - name: goals_per_90
        description: Goals per 90 minutes, rounded to two decimals
      - name: assists_per_90
        description: Assists per 90 minutes, rounded to two decimals

  - name: fct_player_career_timeline
    description: Player performance and market value by season and competition
    columns:
      - name: player_id
        description: Player identifier
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_players')
                field: player_id
      - name: player_name
        description: Player name
      - name: position
        description: Broad playing position
      - name: current_club_name
        description: Current club name from the player dimension
      - name: season
        description: Match season
        data_tests:
          - not_null
      - name: competition_id
        description: Competition identifier
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_competitions')
                field: competition_id
      - name: matches_played
        description: Distinct matches with an appearance in the season and competition
      - name: total_goals
        description: Total goals in the season and competition
      - name: total_assists
        description: Total assists in the season and competition
      - name: total_minutes_played
        description: Total minutes played in the season and competition
      - name: total_yellow_cards
        description: Total yellow cards in the season and competition
      - name: total_red_cards
        description: Total red cards in the season and competition
      - name: goals_per_match
        description: Goals per match, rounded to two decimals
      - name: assists_per_match
        description: Assists per match, rounded to two decimals
      - name: goals_per_90
        description: Goals per 90 minutes, rounded to two decimals
      - name: assists_per_90
        description: Assists per 90 minutes, rounded to two decimals
      - name: season_market_value
        description: Latest player market value on or before the last game in the group
      - name: season_market_value_date
        description: Date of the selected season market value

  - name: fct_market_value_history
    description: Player market value history at player and valuation-date grain
    columns:
      - name: player_id
        description: Player identifier
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_players')
                field: player_id
      - name: player_name
        description: Player name
      - name: position
        description: Broad playing position
      - name: sub_position
        description: Detailed playing position
      - name: valuation_date
        description: Market value record date
        data_tests:
          - not_null
      - name: market_value_in_eur
        description: Player market value in EUR
      - name: current_club_id
        description: Club identifier recorded at valuation time
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: current_club_name
        description: Club name recorded at valuation time
      - name: competition_id
        description: Domestic competition identifier recorded at valuation time
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_competitions')
                field: competition_id

  - name: fct_transfers
    description: Player transfer history with fee-to-market-value comparison
    columns:
      - name: player_id
        description: Player identifier
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_players')
                field: player_id
      - name: position
        description: Broad playing position
      - name: sub_position
        description: Detailed playing position
      - name: player_name
        description: Player name recorded by the transfer source
      - name: transfer_date
        description: Transfer date
        data_tests:
          - not_null
      - name: transfer_season
        description: Transfer season label
      - name: from_club_id
        description: Origin club identifier
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: to_club_id
        description: Destination club identifier
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: from_club_name
        description: Origin club name
      - name: to_club_name
        description: Destination club name
      - name: transfer_fee
        description: Transfer fee in EUR when known
      - name: market_value_in_eur
        description: Player market value in EUR at transfer time when known
      - name: fee_market_value_difference
        description: Transfer fee minus market value in EUR
      - name: fee_market_value_difference_pct
        description: Transfer fee premium or discount relative to market value, in percent

  - name: fct_transfer_market_value_analysis
    description: Detailed transfer-level analysis combining fees, nearest valuations, player transfer history, and valuation competition context
    columns:
      - name: transfer_key
        description: Stable MD5 key generated from all source transfer record fields
        data_tests:
          - unique
          - not_null
      - name: player_id
        description: Transferred player identifier
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_players')
                field: player_id
      - name: player_name
        description: Best available player name from the transfer record or player dimension
      - name: position
        description: Broad player position
      - name: sub_position
        description: Detailed player position
      - name: birth_date
        description: Player date of birth
      - name: country_of_citizenship
        description: Player country of citizenship
      - name: age_at_transfer
        description: Player age in completed years on the transfer date
      - name: transfer_date
        description: Transfer date
        data_tests:
          - not_null
      - name: transfer_year
        description: Calendar year extracted from the transfer date
      - name: transfer_month
        description: Calendar month number extracted from the transfer date
      - name: transfer_season
        description: Source transfer season label
      - name: is_future_transfer
        description: Flag indicating that the transfer date is later than the build date
      - name: transfer_sequence_number
        description: Chronological transfer sequence number for the player
      - name: player_transfer_count
        description: Total number of transfer records for the player
      - name: known_fee_transfer_count
        description: Number of player transfer records with a known fee
      - name: is_latest_transfer
        description: Flag indicating the chronologically latest transfer record for the player
      - name: previous_transfer_date
        description: Chronologically previous transfer date for the player
      - name: days_since_previous_transfer
        description: Days between the previous and current transfer
      - name: next_transfer_date
        description: Chronologically next transfer date for the player
      - name: days_to_next_transfer
        description: Days between the current and next transfer
      - name: from_club_id
        description: Origin club identifier
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: from_club_name
        description: Best available origin club name
      - name: to_club_id
        description: Destination club identifier
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: to_club_name
        description: Best available destination club name
      - name: transfer_fee
        description: Transfer fee in EUR when known
      - name: cumulative_known_transfer_fee
        description: Running sum of known player transfer fees through the current transfer
      - name: total_transfer_fee
        description: Sum of all known transfer fees for the player
      - name: avg_transfer_fee
        description: Average known transfer fee for the player
      - name: max_transfer_fee
        description: Highest known transfer fee for the player
      - name: fee_status
        description: Fee availability category; unknown, zero_fee, or paid
        data_tests:
          - accepted_values:
              arguments:
                values: ['unknown', 'zero_fee', 'paid']
      - name: transfer_record_market_value
        description: Player market value recorded directly on the transfer record
      - name: market_value_baseline_date
        description: Date represented by the selected fee comparison market value
      - name: market_value_baseline
        description: Market value used for fee comparison, preferring the transfer record and otherwise the latest prior valuation
      - name: market_value_baseline_source
        description: Source of the selected fee comparison market value
        data_tests:
          - accepted_values:
              arguments:
                values: ['transfer_record', 'latest_prior_valuation', 'unavailable']
      - name: days_since_market_value_baseline
        description: Days between the selected market value baseline date and transfer date
      - name: fee_market_value_difference
        description: Transfer fee minus the selected market value baseline in EUR
      - name: fee_market_value_difference_pct
        description: Transfer fee premium or discount relative to the selected market value baseline, in percent
      - name: fee_to_market_value_ratio
        description: Transfer fee divided by the selected market value baseline
      - name: prior_valuation_date
        description: Latest available player valuation date on or before the transfer date
      - name: prior_market_value
        description: Player market value on the latest prior valuation date
      - name: prior_valuation_club_id
        description: Club identifier recorded on the latest prior valuation
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: prior_valuation_club_name
        description: Club name recorded on the latest prior valuation
      - name: prior_valuation_competition_id
        description: Domestic competition identifier recorded on the latest prior valuation
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_competitions')
                field: competition_id
      - name: prior_competition_name
        description: Competition name associated with the latest prior valuation
      - name: prior_competition_country_name
        description: Competition country associated with the latest prior valuation
      - name: prior_competition_confederation
        description: Competition confederation associated with the latest prior valuation
      - name: days_since_prior_valuation
        description: Days between the latest prior valuation and transfer
      - name: next_valuation_date
        description: First available player valuation date after the transfer date
      - name: next_market_value
        description: Player market value on the first valuation date after transfer
      - name: next_valuation_club_id
        description: Club identifier recorded on the first valuation after transfer
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_clubs')
                field: club_id
      - name: next_valuation_club_name
        description: Club name recorded on the first valuation after transfer
      - name: next_valuation_competition_id
        description: Domestic competition identifier recorded on the first valuation after transfer
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_competitions')
                field: competition_id
      - name: next_competition_name
        description: Competition name associated with the first valuation after transfer
      - name: next_competition_country_name
        description: Competition country associated with the first valuation after transfer
      - name: next_competition_confederation
        description: Competition confederation associated with the first valuation after transfer
      - name: days_to_next_valuation
        description: Days between the transfer and first subsequent valuation
      - name: market_value_change_after_transfer
        description: First subsequent market value minus the selected market value baseline in EUR
      - name: market_value_change_after_transfer_pct
        description: Market value change after transfer relative to the selected baseline, in percent
      - name: market_value_direction_after_transfer
        description: Direction of the first subsequent market value change; increase, decrease, unchanged, or unavailable
        data_tests:
          - accepted_values:
              arguments:
                values: ['increase', 'decrease', 'unchanged', 'unavailable']
      - name: valuation_context_change
        description: Competition context change between the latest prior and first subsequent valuation
        data_tests:
          - accepted_values:
              arguments:
                values: ['same_competition', 'competition_change', 'country_change', 'unavailable']
      - name: first_valuation_date
        description: Earliest available valuation date in the player's history
      - name: latest_valuation_date
        description: Latest available valuation date in the player's history
      - name: first_market_value
        description: Player market value on the earliest available valuation date
      - name: current_market_value
        description: Player market value on the latest available valuation date
      - name: highest_market_value
        description: Highest available player market value
      - name: career_market_value_growth
        description: Latest market value minus first market value in EUR
      - name: career_market_value_growth_pct
        description: Percentage growth from first to latest player market value
